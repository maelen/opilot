# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  check-types:
    desc: Check types
    cmds:
      - node node_modules/typescript/bin/tsc --noEmit
    silent: false

  check:
    desc: Run linter check
    cmds:
      - node node_modules/ultracite/dist/index.js check
    silent: false

  lint:
    desc: Run linter
    cmds:
      - node node_modules/ultracite/dist/index.js check
    silent: false

  lint-fix:
    desc: Run linter with auto-fix
    cmds:
      - node node_modules/ultracite/dist/index.js fix
    silent: false

  check-all:
    desc: Run all checks
    cmds:
      - task: check-types
      - task: lint
    silent: false

  compile:
    desc: Compile the extension
    env:
      NODE_ENV: production
    cmds:
      - node node_modules/tsup/dist/cli-default.js
    silent: false

  unit-tests:
    desc: Run unit tests
    cmds:
      - node node_modules/vitest/vitest.mjs run src {{.CLI_ARGS}}
    silent: false

  unit-test-coverage:
    desc: Run unit tests with coverage
    cmds:
      - node node_modules/vitest/vitest.mjs run src --coverage {{.CLI_ARGS}}
    silent: false

  extension-tests:
    desc: Run extension tests
    cmds:
      - node test/extension/index.mjs {{.CLI_ARGS}}
    silent: false

  pull-models:
    desc: Pull required models for integration tests
    cmds:
      - ollama pull smollm:135m
      - ollama pull qwen3:0.6b
      - ollama pull kimi-k2.5:cloud
    silent: false

  integration-tests:
    desc: Run integration tests
    deps: [pull-models]
    cmds:
      - node node_modules/vitest/vitest.mjs run -c vitest.integration.config.js test/integration {{.CLI_ARGS}}
    silent: false

  precommit:
    desc: Run pre-commit checks
    deps: [check-types]
    cmds:
      - task: lint-fix
    silent: false

  prerelease:
    desc: Create a pre-release
    deps: [compile]
    cmds:
      - node node_modules/zx/build/cli.js ./scripts/release.mjs -- --pre-release -- {{.CLI_ARGS}}
    silent: false

  release:
    desc: Release the extension
    deps: [compile]
    cmds:
      - node node_modules/zx/build/cli.js ./scripts/release.mjs {{.CLI_ARGS}}
    silent: false

  test-all:
    desc: Run all tests
    cmds:
      - task: unit-tests
      - task: extension-tests
      - task: integration-tests
    silent: false

  test-build-release:
    desc: Test, Build & Release
    deps: [check-all, test-all]
    cmds:
      - task: release
    silent: false

  watch:
    desc: Watch for changes and recompile
    cmds:
      - node node_modules/tsup/dist/cli-default.js --watch
    silent: false
